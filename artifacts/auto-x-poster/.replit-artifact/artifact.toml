kind = "web"
previewPath = "/"
title = "Auto X Poster"
version = "1.0.0"
id = "artifacts/auto-x-poster"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20551

[services.development]
run = "pnpm --filter @workspace/auto-x-poster run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/auto-x-poster", "run", "build" ]
publicDir = "artifacts/auto-x-poster/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20551"
BASE_PATH = "/"
