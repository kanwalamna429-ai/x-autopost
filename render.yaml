databases:
  - name: auto-x-poster-db
    databaseName: autoxposter
    user: autoxposter
    plan: free

services:
  - type: web
    name: auto-x-poster
    env: node
    plan: free
    buildCommand: chmod +x ./render-build.sh && ./render-build.sh
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: auto-x-poster-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: X_CLIENT_ID
        sync: false
      - key: X_CLIENT_SECRET
        sync: false
